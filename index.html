<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="10 萬到 100 萬資金需求皆可線上登記，有貸款或警示戶也能先送出資料。">
  <meta name="theme-color" content="#f4faf7">
  <title>急用資金先選額度｜線上資金需求登記</title>
  <link rel="stylesheet" href="styles.css?v=2026071901">
  <script src="app.js?v=2026071901" defer></script>
</head>
<body data-page="amount">
  <header class="site-header">
    <div class="header-inner">
      <a class="wordmark" href="index.html" aria-label="返回金額選擇頁">
        <span class="wordmark-mark" aria-hidden="true">額</span>
        <span>線上額度評估</span>
      </a>
      <span class="header-note">手機無需驗證碼</span>
    </div>
  </header>

  <main class="amount-main">
    <section class="amount-shell" aria-labelledby="amount-title">
      <div class="flow-nav" aria-label="申請流程">
        <span class="flow-item current">1 選擇金額</span>
        <span class="flow-line" aria-hidden="true"></span>
        <span class="flow-item">2 填寫資料</span>
      </div>

      <div class="amount-intro">
        <p class="eyebrow">10 萬到 100 萬都能登記</p>
        <h1 id="amount-title">急用資金？<br><strong>先選你想借多少</strong></h1>
        <p>有貸款、警示戶也能先送。選好金額、留下資料，再由審核專員一對一確認後續放款流程。</p>
      </div>

      <div class="amount-grid" id="amount-options" aria-label="選擇貸款金額">
        <button class="amount-option" type="button" data-amount="10萬-20萬" aria-pressed="false">
          <span class="amount-number">10<span>萬</span> 至 20<span>萬</span></span>
          <small>立即週轉需求</small>
        </button>
        <button class="amount-option" type="button" data-amount="20萬-30萬" aria-pressed="false">
          <span class="amount-number">20<span>萬</span> 至 30<span>萬</span></span>
          <small>資金缺口登記</small>
        </button>
        <button class="amount-option featured" type="button" data-amount="30萬-50萬" aria-pressed="false">
          <span class="popular-label">高額需求可送</span>
          <span class="amount-number">30<span>萬</span> 至 50<span>萬</span></span>
          <small>較高額度需求</small>
        </button>
        <button class="amount-option" type="button" data-amount="50萬-100萬" aria-pressed="false">
          <span class="amount-number">50<span>萬</span> 至 100<span>萬</span></span>
          <small>百萬內需求登記</small>
        </button>
      </div>

      <div class="selection-message" id="selection-message" aria-live="polite">點一個金額，馬上填資料</div>

      <button class="primary-button amount-continue" id="amount-continue" type="button" disabled>
        先選擇你想借的金額
      </button>

      <div class="trust-list" aria-label="申請說明">
        <span><b aria-hidden="true">✓</b> 有貸款照樣填</span>
        <span><b aria-hidden="true">✓</b> 警示戶可以送</span>
        <span><b aria-hidden="true">✓</b> 手機無需驗證碼</span>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>本頁僅供資金需求登記，不代表核准、利率或撥款承諾，實際結果依個別條件確認。</p>
  </footer>

  <noscript>請開啟 JavaScript 後使用線上申請功能。</noscript>
</body>
</html>
