<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="選擇資金需求金額，線上完成額度需求登記。">
  <meta name="theme-color" content="#f4f7f8">
  <title>選擇資金需求｜線上額度評估</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body data-page="amount">
  <header class="site-header">
    <div class="header-inner">
      <a class="wordmark" href="index.html" aria-label="返回金額選擇頁">
        <span class="wordmark-mark" aria-hidden="true">額</span>
        <span>線上額度評估</span>
      </a>
      <span class="header-note">資料加密傳送</span>
    </div>
  </header>

  <main class="amount-main">
    <section class="amount-shell" aria-labelledby="amount-title">
      <div class="flow-nav" aria-label="申請流程">
        <span class="flow-item current">選擇金額</span>
        <span class="flow-line" aria-hidden="true"></span>
        <span class="flow-item">填寫資料</span>
      </div>

      <div class="amount-intro">
        <p class="eyebrow">資金需求登記</p>
        <h1 id="amount-title">你這次需要<br><strong>多少資金？</strong></h1>
        <p>最高可選 100 萬。選好需求金額後，再填寫簡單聯絡資料。</p>
      </div>

      <div class="amount-grid" id="amount-options" aria-label="選擇貸款金額">
        <button class="amount-option" type="button" data-amount="10萬-20萬" aria-pressed="false">
          <span class="amount-number">10<span>萬</span> - 20<span>萬</span></span>
          <small>小額資金需求</small>
        </button>
        <button class="amount-option" type="button" data-amount="20萬-30萬" aria-pressed="false">
          <span class="amount-number">20<span>萬</span> - 30<span>萬</span></span>
          <small>日常週轉需求</small>
        </button>
        <button class="amount-option featured" type="button" data-amount="30萬-50萬" aria-pressed="false">
          <span class="popular-label">較多人選擇</span>
          <span class="amount-number">30<span>萬</span> - 50<span>萬</span></span>
          <small>較高資金需求</small>
        </button>
        <button class="amount-option" type="button" data-amount="50萬-100萬" aria-pressed="false">
          <span class="amount-number">50<span>萬</span> - 100<span>萬</span></span>
          <small>高額資金需求</small>
        </button>
      </div>

      <div class="selection-message" id="selection-message" aria-live="polite">請先選擇一個金額</div>

      <button class="primary-button amount-continue" id="amount-continue" type="button" disabled>
        選擇金額後繼續
      </button>

      <div class="trust-list" aria-label="申請說明">
        <span><b aria-hidden="true">✓</b> 免費登記</span>
        <span><b aria-hidden="true">✓</b> 警示戶也可送出</span>
        <span><b aria-hidden="true">✓</b> 不影響聯徵</span>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>本頁僅供資金需求登記，不代表核准、利率或撥款承諾，實際結果依個別條件確認。</p>
  </footer>

  <noscript>請開啟 JavaScript 後使用線上申請功能。</noscript>
</body>
</html>
